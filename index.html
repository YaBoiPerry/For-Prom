<html lang="en">

<style>
  /* Self-contained font stack — no internet required */
  /* 'Cinzel Decorative' feel: use built-in serif display fonts */
  @font-face {
    font-family: 'DisplaySerif';
    src: local('Didot'), local('Bodoni MT'), local('Bodoni 72'), local('Palatino Linotype'), local('Palatino'), local('Book Antiqua'), local('Georgia');
  }
  /* Map the font families used in CSS to reliable system fonts */
</style>
<style>
  :root {
    --rose: #d4607a;
    --blush: #f8c8d8;
    --deep: #130810;
    --petal: #fde8ee;
    --gold: #c9a86c;
    --cream: #fff0f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    font-family: 'Palatino Linotype', 'Palatino', 'Book Antiqua', 'Hoefler Text', Georgia, serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* Custom cursor */
  .cursor {
    width: 12px; height: 12px;
    background: var(--rose);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, background 0.3s;
    mix-blend-mode: screen;
  }
  .cursor-trail {
    width: 30px; height: 30px;
    border: 1px solid rgba(155,107,191,0.4);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.25s ease, opacity 0.3s;
  }

  @media (hover: none) {
    .cursor, .cursor-trail { display: none; }
  }

  /* Petals */
  .petal {
    position: fixed;
    width: 10px; height: 14px;
    background: radial-gradient(ellipse at 40% 30%, #f9b8d0, #d060a0);
    border-radius: 100% 0 100% 0;
    opacity: 0;
    animation: petalFall linear infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes petalFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { transform: translateY(110vh) rotate(540deg) translateX(60px); opacity: 0; }
  }

  /* Stars */
  .star {
    position: fixed;
    background: white;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.8; transform: scale(1.2); }
  }

  /* Main layout */
  .scene {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 10;
    padding: 40px 20px;
  }

  /* Decorative arch */
  .arch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: min(700px, 95vw);
    height: 340px;
    border: 1px solid rgba(210,130,190,0.15);
    border-bottom: none;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    pointer-events: none;
  }
  .arch::before {
    content: '';
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(210,130,190,0.08);
    border-bottom: none;
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  /* Card */
  .card {
    background: rgba(253,245,240,0.04);
    border: 1px solid rgba(220,140,180,0.28);
    border-radius: 2px;
    padding: clamp(40px,8vw,80px) clamp(30px,7vw,80px);
    max-width: 620px;
    width: 100%;
    text-align: center;
    position: relative;
    backdrop-filter: blur(4px);
    animation: cardReveal 1.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes cardReveal {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card::before, .card::after {
    content: '✦';
    position: absolute;
    color: var(--gold);
    font-size: 11px;
    opacity: 0.5;
  }
  .card::before { top: 14px; left: 14px; }
  .card::after  { bottom: 14px; right: 14px; }

  /* Corner ornaments */
  .corner { position: absolute; width: 30px; height: 30px; opacity: 0.35; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 10px; left: 10px; }
  .corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
  .corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
  .corner.br { bottom: 10px; right: 10px; transform: scale(-1); }

  /* Typography */
  .eyebrow {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-weight: 100;
    font-size: 10px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 28px;
    animation: fadeUp 1s 0.4s both;
  }

  .headline {
    font-family: 'Didot', 'Bodoni MT', 'Bodoni 72', 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
    font-size: clamp(30px, 7vw, 50px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 10px;
    animation: fadeUp 1s 0.6s both, shimmer 3s 2s linear infinite;
    background: linear-gradient(135deg, #f9a8c0 0%, #c070d0 35%, #f470a0 65%, #d4a0e8 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: block;
  }
  .headline em {
    display: block;
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 700;
    background: linear-gradient(135deg, #f9a8c0 0%, #c070d0 35%, #f470a0 65%, #d4a0e8 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 1s 0.6s both, shimmer 3s 2s linear infinite;
  }
  @keyframes shimmer {
    to { background-position: 200% center; }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px auto;
    width: 80%;
    animation: fadeUp 1s 0.8s both;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(210,130,190,0.3), transparent);
  }
  .divider-rose { font-size: 18px; }

  .message {
    font-size: clamp(15px, 2.5vw, 19px);
    font-weight: 300;
    font-style: italic;
    color: rgba(253,245,240,0.75);
    line-height: 1.85;
    margin-bottom: 36px;
    animation: fadeUp 1s 1s both;
  }
  .message strong {
    font-style: normal;
    font-weight: 400;
    color: var(--blush);
  }

  /* Date badge */
  .date-badge {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid rgba(220,140,180,0.28);
    padding: 14px 32px;
    margin-bottom: 44px;
    position: relative;
    animation: fadeUp 1s 1.1s both;
  }
  .date-badge::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid rgba(210,130,190,0.1);
  }
  .date-label {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 9px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
    margin-bottom: 4px;
  }
  .date-value {
    font-size: 20px;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.05em;
  }

  /* Buttons */
  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 1s 1.3s both;
  }

  .btn {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 16px 40px;
    border: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn:hover { transform: translateY(-3px) scale(1.04); }
  .btn:hover::after { opacity: 1; }
  .btn:active { transform: translateY(0) scale(0.98); }

  .btn-yes {
    background: linear-gradient(135deg, #d4607a, #6a2fa8);
    color: white;
    box-shadow: 0 8px 30px rgba(210,80,130,0.4), 0 0 20px rgba(120,60,180,0.25);
    transform-origin: center;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s ease, z-index 0s !important;
  }
  .btn-yes::after { background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent); }
  .btn-yes:hover { box-shadow: 0 14px 50px rgba(210,80,130,0.6), 0 0 30px rgba(120,60,180,0.4); }

  .btn-no {
    background: transparent;
    color: rgba(253,245,240,0.4);
    border: 1px solid rgba(253,245,240,0.12);
  }
  .btn-no:hover {
    color: rgba(253,245,240,0.6);
    border-color: rgba(253,245,240,0.25);
    transform: translateY(-3px) translateX(4px) rotate(2deg) !important;
  }


  /* Cat images */
  .cat-main {
    display: block;
    margin: 0 auto 20px;
    width: 100px;
    opacity: 0.92;
    animation: fadeUp 1s 1.5s both, catBob 3s 2.5s ease-in-out infinite;
    pointer-events: none;
    filter: drop-shadow(0 4px 12px rgba(155,107,191,0.2));
  }
  @keyframes catBob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%       { transform: translateY(-8px) rotate(2deg); }
  }
  .yes-cats {
    display: flex;
    gap: 0;
    align-items: center;
    justify-content: center;
    width: 100%;
  }
  .yes-cat {
    width: 160px;
    animation: bounceIn 0.7s both;
    filter: drop-shadow(0 4px 20px rgba(155,107,191,0.3));
    flex-shrink: 0;
  }
  .yes-cat:nth-child(1) { animation-delay: 0.4s; }
  .yes-cat:nth-child(2) { animation-delay: 0.7s; }
  .yes-text {
    flex: 1;
    text-align: center;
    padding: 0 12px;
  }

  /* Yes overlay */
  .yes-overlay {
    position: fixed;
    inset: 0;
    background: var(--deep);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    text-align: center;
    padding: 40px;
  }
  .yes-overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .yes-emoji {
    font-family: 'Didot', 'Bodoni MT', 'Bodoni 72', 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
    font-size: clamp(40px, 9vw, 80px);
    margin-bottom: 24px;
    background: linear-gradient(135deg, #f9a8c0 0%, #c070d0 35%, #f470a0 65%, #d4a0e8 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: bounceIn 0.8s 0.3s both, shimmer 3s 1s linear infinite;
  }
  .yes-title {
    font-family: 'Didot', 'Bodoni MT', 'Bodoni 72', 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
    font-size: clamp(24px, 5vw, 42px);
    background: linear-gradient(135deg, #e8b4bc, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 1s 0.5s both;
    margin-bottom: 16px;
  }
  .yes-sub {
    font-size: 20px;
    font-style: italic;
    font-weight: 300;
    color: rgba(253,245,240,0.65);
    animation: fadeUp 1s 0.8s both;
  }
  @keyframes bounceIn {
    from { transform: scale(0); opacity: 0; }
    60%  { transform: scale(1.25); }
    to   { transform: scale(1); opacity: 1; }
  }

  /* Burst confetti */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    z-index: 99;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Mobile / iPhone fixes */
  @media (max-width: 480px) {
    .card {
      padding: 30px 24px;
      margin: 16px;
      width: calc(100% - 32px);
    }
    .cat-main { width: 75px; }
    .btn { padding: 14px 28px; font-size: 10px; }
    .date-badge { padding: 10px 20px; }
    .yes-cat { width: 110px; }
  }

  /* Glow */
  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 2;
    animation: orbPulse ease-in-out infinite alternate;
  }
  @keyframes orbPulse {
    from { opacity: 0.12; transform: scale(1); }
    to   { opacity: 0.22; transform: scale(1.15); }
  }
</style>
</head>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  const trail = document.getElementById('cursorTrail');
  let mx = 0, my = 0, tx = 0, ty = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });
  setInterval(() => {
    tx += (mx - tx) * 0.15;
    ty += (my - ty) * 0.15;
    trail.style.left = tx + 'px';
    trail.style.top = ty + 'px';
  }, 16);

  // Stars
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;`;
    document.body.appendChild(s);
  }

  // Petals
  function spawnPetal() {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.left = Math.random() * 110 - 5 + 'vw';
    p.style.top = '-20px';
    const dur = 6 + Math.random() * 8;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = '0s';
    p.style.transform = `rotate(${Math.random()*360}deg) scale(${0.6+Math.random()*0.8})`;
    p.style.opacity = 0;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), dur * 1000 + 500);
  }
  setInterval(spawnPetal, 600);
  for (let i = 0; i < 8; i++) setTimeout(spawnPetal, i * 300);

  // No button escapes
  const noBtn = document.getElementById('noBtn');
  const yesBtn = document.querySelector('.btn-yes');
  const card = document.querySelector('.card');
  let noCount = 0;

  // Position no button absolutely within the card, below the yes button
  function initNoBtn() {
    const cardR = card.getBoundingClientRect();
    const yesR = document.querySelector('.btn-yes').getBoundingClientRect();
    noBtn.style.position = 'fixed';
    noBtn.style.zIndex = '60';
    noBtn.style.transition = 'left 0.2s cubic-bezier(0.34,1.56,0.64,1), top 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease';
    // Start it centered below the yes button
    noBtn.style.left = (cardR.left + cardR.width/2 - noBtn.offsetWidth/2) + 'px';
    noBtn.style.top  = (yesR.bottom + 16) + 'px';
  }
  window.addEventListener('load', () => requestAnimationFrame(() => setTimeout(initNoBtn, 50)));
  document.addEventListener('DOMContentLoaded', () => setTimeout(initNoBtn, 200));

  function teleportNoBtn() {
    const cardR = card.getBoundingClientRect();
    const pad = 20;
    const w = noBtn.offsetWidth;
    const h = noBtn.offsetHeight;
    // Roam freely within the card bounds
    const minX = cardR.left + pad;
    const maxX = cardR.right - w - pad;
    const minY = cardR.top + pad;
    const maxY = cardR.bottom - h - pad;
    noBtn.style.left = (minX + Math.random() * (maxX - minX)) + 'px';
    noBtn.style.top  = (minY + Math.random() * (maxY - minY)) + 'px';
  }

  function growYesBtn() {
    // Exponential growth: 1, 1.5, 2.25, 3.375, 5.06, 7.6...
    const scale = Math.pow(1.5, noCount);
    yesBtn.style.transform = `scale(${scale})`;
    yesBtn.style.zIndex = `${40 + noCount}`;
    const glow = Math.min(0.9, 0.3 + noCount * 0.12);
    yesBtn.style.boxShadow = `0 0 ${30 + noCount * 30}px ${noCount * 20}px rgba(155,107,191,${glow})`;
  }

  document.addEventListener('mousemove', e => {});

  function handleNoClick(e) {
    e.preventDefault();
    noCount++;
    growYesBtn();
    if (noCount >= 5) {
      noBtn.style.opacity = '0';
      noBtn.style.pointerEvents = 'none';
    } else {
      teleportNoBtn();
    }
  }
  noBtn.addEventListener('click', handleNoClick);
  noBtn.addEventListener('touchstart', e => { e.preventDefault(); handleNoClick(e); }, { passive: false });

  // Confetti burst
  function burstConfetti() {
    const colors = ['#c0606a','#c9a86c','#f2c4ce','#fde8ee','#ffffff'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.left = '50vw';
      c.style.top = '50vh';
      const angle = Math.random() * Math.PI * 2;
      const dist = 100 + Math.random() * 300;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      c.style.animation = 'none';
      document.body.appendChild(c);
      c.animate([
        { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
        { transform: `translate(${tx}px,${ty}px) rotate(${Math.random()*720}deg)`, opacity: 0 }
      ], { duration: 900 + Math.random()*600, easing: 'cubic-bezier(0,.9,.57,1)', fill: 'forwards', delay: Math.random()*200 });
      setTimeout(() => c.remove(), 1800);
    }
  }

  function sayYes() {
    burstConfetti();
    setTimeout(() => {
      document.getElementById('yesOverlay').classList.add('active');
    }, 300);
  }
</script>
</body>
</html>
